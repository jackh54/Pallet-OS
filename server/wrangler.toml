name = "pallet-os-server"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ADMIN_USERNAME = "admin"
# Override in Cloudflare dashboard or wrangler secret put ADMIN_PASSWORD
JWT_ISSUER = "pallet-os"

[[d1_databases]]
binding = "DB"
database_name = "pallet-os"
database_id = "00000000-0000-0000-0000-000000000001"

[observability]
enabled = true

Section "Monitor"
  Identifier "Monitor0"
  Option "PreferredMode" "auto"
EndSection

Section "Device"
  Identifier "AMDGPU"
  Driver "amdgpu"
  Option "TearFree" "true"
  Option "AccelMethod" "glamor"
EndSection

Section "Screen"
  Identifier "Screen0"
  Device "AMDGPU"
  Monitor "Monitor0"
  DefaultDepth 24
  SubSection "Display"
    Depth 24
    Modes "auto"
  EndSub
EndSection

Section "ServerFlags"
  Option "DontVTSwitch" "false"
  Option "AllowMouseOpenFail" "true"
EndSection
